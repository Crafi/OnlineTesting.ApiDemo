name: Azure Static Web Apps CI/CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    environment: production
    name: Build and Deploy Job

    permissions:
      contents: read
      id-token: write

    env:
      NODE_VERSION: "22"
      DIST_DIR: "dist"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set VERSION from tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF##*/}"
          else
            VERSION="manual-$(date +%Y%m%d%H%M)-${GITHUB_SHA::7}"
          fi
          SAFE_VERSION="$(echo "$VERSION" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')"
          echo "VERSION=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.vars.outputs.VERSION }}

      - name: Inject runtime config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG="${{ env.DIST_DIR }}/config.js"
          if [ -f "$CONFIG" ]; then
            VALUE=${VITE_API_BASE_URL:-""}
            VERSION=${VITE_APP_VERSION:-""}
            sed -i "s|__VITE_API_BASE_URL__|$VALUE|g" "$CONFIG"
            sed -i "s|__VITE_APP_VERSION__|$VERSION|g" "$CONFIG"
          fi
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.vars.outputs.VERSION }}

      - name: Add SWA SPA fallback config
        shell: bash
        run: |
          cat > "${{ env.DIST_DIR }}/staticwebapp.config.json" <<'JSON'
          {
            "navigationFallback": {
              "rewrite": "/index.html",
              "exclude": [
                "/assets/*",
                "/*.css",
                "/*.js",
                "/*.png",
                "/*.jpg",
                "/*.jpeg",
                "/*.svg",
                "/*.ico",
                "/*.webp",
                "/*.map"
              ]
            }
          }
          JSON

      - name: Build And Deploy (Static Web Apps)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_RIVER_095FAD403 }}
          action: "upload"
          app_location: "dist"
          output_location: ""
          skip_app_build: true
