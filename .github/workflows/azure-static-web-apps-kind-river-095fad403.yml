name: Azure Static Web Apps CI/CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    environment: production
    name: Build and Deploy Job

    permissions:
      contents: read
      id-token: write

    env:
      NODE_VERSION: "22"
      DIST_DIR: "dist"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set VERSION from tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF##*/}"
          else
            VERSION="manual-$(date +%Y%m%d%H%M)-${GITHUB_SHA::7}"
          fi
          SAFE_VERSION="$(echo "$VERSION" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')"
          echo "VERSION=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.vars.outputs.VERSION }}

      - name: Inject runtime config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG="${{ env.DIST_DIR }}/config.js"
          if [ -f "$CONFIG" ]; then
            VALUE=${VITE_API_BASE_URL:-""}
            VERSION=${VITE_APP_VERSION:-""}
            sed -i "s|__VITE_API_BASE_URL__|$VALUE|g" "$CONFIG"
            sed -i "s|__VITE_APP_VERSION__|$VERSION|g" "$CONFIG"
          fi
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.vars.outputs.VERSION }}

      - name: Add SWA SPA fallback config
        shell: bash
        run: |
          cat > "${{ env.DIST_DIR }}/staticwebapp.config.json" <<'JSON'
          {
            "navigationFallback": {
              "rewrite": "/index.html",
              "exclude": [
                "/assets/*",
                "/*.css",
                "/*.js",
                "/*.png",
                "/*.jpg",
                "/*.jpeg",
                "/*.svg",
                "/*.ico",
                "/*.webp",
                "/*.map"
              ]
            }
          }
          JSON

      - name: Build And Deploy (Static Web Apps)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_RIVER_095FAD403 }}
          action: "upload"
          app_location: "dist"
          output_location: ""
          skip_app_build: true

  docker_to_storage:
    runs-on: ubuntu-latest
    needs: build_and_deploy_job
    environment: production
    name: Build Docker image and upload to Blob

    permissions:
      contents: read
      id-token: write

    env:
      NODE_VERSION: "20"
      DIST_DIR: "dist"

      STORAGE_ACCOUNT: onlinetestingstorage
      STORAGE_CONTAINER: dockers
      BLOB_PREFIX: onlinetestingfe

      IMAGE_NAME: onlinetestingfe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set VERSION from tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF##*/}"
          else
            VERSION="manual-$(date +%Y%m%d%H%M)-${GITHUB_SHA::7}"
          fi
          SAFE_VERSION="$(echo "$VERSION" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')"
          echo "VERSION=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (dist for docker)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.vars.outputs.VERSION }}

      - name: Inject runtime config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG="${{ env.DIST_DIR }}/config.js"
          if [ -f "$CONFIG" ]; then
            VALUE=${VITE_API_BASE_URL:-""}
            VERSION=${VITE_APP_VERSION:-""}
            sed -i "s|__VITE_API_BASE_URL__|$VALUE|g" "$CONFIG"
            sed -i "s|__VITE_APP_VERSION__|$VERSION|g" "$CONFIG"
          fi
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_VERSION: ${{ steps.vars.outputs.VERSION }}

      - name: Add SPA fallback config (for offline)
        shell: bash
        run: |
          cat > "${{ env.DIST_DIR }}/staticwebapp.config.json" <<'JSON'
          {
            "navigationFallback": {
              "rewrite": "/index.html",
              "exclude": [
                "/assets/*",
                "/*.css",
                "/*.js",
                "/*.png",
                "/*.jpg",
                "/*.jpeg",
                "/*.svg",
                "/*.ico",
                "/*.webp",
                "/*.map"
              ]
            }
          }
          JSON

      - name: Build Docker image (nginx, runtime config)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.VERSION }}"

          cat > nginx.conf <<'NGINX'
          server {
            listen 80;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            location / {
              try_files $uri $uri/ /index.html;
            }
          }
          NGINX

          cat > Dockerfile.offline <<'DOCKERFILE'
          FROM nginx:alpine
          COPY dist/ /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh
          ENTRYPOINT ["/entrypoint.sh"]
          EXPOSE 80
          DOCKERFILE

          # Runtime config injection for offline installs.
          cat > entrypoint.sh <<'ENTRY'
          #!/bin/sh
          set -eu

          CONFIG=/usr/share/nginx/html/config.js
          TEMPLATE=/usr/share/nginx/html/config.template.js

          if [ -f "$CONFIG" ] && [ ! -f "$TEMPLATE" ]; then
            cp "$CONFIG" "$TEMPLATE"
          fi

          if [ -f "$TEMPLATE" ]; then
            VALUE=${VITE_API_BASE_URL:-${VITE_API_URL:-""}}
            VERSION=${VITE_APP_VERSION:-""}
            sed "s|__VITE_API_BASE_URL__|$VALUE|g" "$TEMPLATE" | sed "s|__VITE_APP_VERSION__|$VERSION|g" > "$CONFIG"
          fi

          exec nginx -g 'daemon off;'
          ENTRY

          docker build -f Dockerfile.offline -t "${IMAGE_NAME}:${VERSION}" .

      - name: Export Docker image to tar.gz
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.VERSION }}"
          docker save "${IMAGE_NAME}:${VERSION}" | gzip > "${IMAGE_NAME}_${VERSION}.tar.gz"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload tar.gz to Azure Blob container
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.VERSION }}"
          FILE="${IMAGE_NAME}_${VERSION}.tar.gz"

          az storage blob upload \
            --account-name "${{ env.STORAGE_ACCOUNT }}" \
            --container-name "${{ env.STORAGE_CONTAINER }}" \
            --name "${{ env.BLOB_PREFIX }}/$FILE" \
            --file "$FILE" \
            --auth-mode login \
            --overwrite true

      - name: List blobs (sanity)
        shell: bash
        run: |
          az storage blob list \
            --account-name "${{ env.STORAGE_ACCOUNT }}" \
            --container-name "${{ env.STORAGE_CONTAINER }}" \
            --prefix "${{ env.BLOB_PREFIX }}/" \
            --auth-mode login \
            --output table
